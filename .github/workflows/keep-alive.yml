name: Backend'i uyanik tut

on:
  schedule:
    # Render'in ucretsiz plani ~15 dakika hareketsizlikten sonra uykuya
    # geciyor; bu yuzden 10 dakikada bir ping atarak hic uykuya girmesini
    # engelliyoruz.
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Backend'e istek at
        run: curl -sf --max-time 60 https://akilli-yatirim-platformu.onrender.com/ || true
