name: Backend'i uyanik tut

on:
  schedule:
    # Render'in ucretsiz plani ~15 dakika hareketsizlikten sonra uykuya
    # geciyor. Her 5 dakikada bir tetiklenip, icinde rastgele bir gecikme
    # ekleyerek istegin her seferinde farkli bir anda gitmesini sagliyoruz -
    # boylece hep ayni dakikada gelen, "bariz otomatik ping" gibi gorunen
    # sabit bir desen olusmuyor.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Rastgele bir sure bekle
        run: sleep $((RANDOM % 240))
      - name: Backend'e istek at
        run: curl -sf --max-time 60 https://akilli-yatirim-platformu.onrender.com/ || true
