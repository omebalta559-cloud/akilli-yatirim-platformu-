services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yatirim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/yatirim
      REDIS_URL: redis://redis:6379/0
      CHROMA_PERSIST_DIR: /chroma_data
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - chroma_data:/chroma_data
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      # NEXT_PUBLIC_API_URL bilerek bos: yerelde backend adresi otomatik
      # algilanir (bkz. frontend/src/lib/api.ts). Uretimde (Vercel vb.) bu
      # degisken acikca ayarlanmalidir.
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: 159776672745-2c52gfivbhd2qso11elm1t2o5kb6l6jj.apps.googleusercontent.com
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
  frontend_node_modules:
